<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>好感度管理</title>

<style>

body{
font-family:'PingFang SC','Microsoft YaHei',sans-serif;
background:linear-gradient(135deg,#fce4ec 0%,#ffe0e0 100%);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:30px;
box-shadow:0 15px 35px rgba(255,105,135,0.2);
text-align:center;
width:340px;
border:2px solid white;
}

h1{
color:#d81b60;
}

.score{
font-size:2rem;
color:#ff4d6d;
margin:10px;
}

input{
width:120px;
padding:10px;
border-radius:10px;
border:1px solid #ffc1d7;
text-align:center;
margin:10px;
}

button{
padding:10px 18px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>好感度管理</h1>

<div class="score" id="scoreDisplay">0</div>

<input type="number" id="value" placeholder="输入数值">

<br>

<button onclick="setValue()">直接设置</button>

<button onclick="add100()">+100</button>

<button onclick="minus100()">-100</button>

<button onclick="meet()">见面</button>

</div>

<script>

const initial = 1000000

function getScore(){
return parseFloat(localStorage.getItem("love_score"))||initial
}

function saveScore(v){
localStorage.setItem("love_score",v)
localStorage.setItem("last_update",Date.now())
updateDisplay()
}

function updateDisplay(){
document.getElementById("scoreDisplay").innerText=
Math.floor(getScore()).toLocaleString()
}

function setValue(){
let v=parseFloat(document.getElementById("value").value)
if(!isNaN(v)) saveScore(v)
}

function add100(){
let v=getScore()
v+=100
saveScore(v)
}

function minus100(){
let v=getScore()
v-=100
if(v<0)v=0
saveScore(v)
}

function meet(){
let v=getScore()
v+=10000
saveScore(v)
}

updateDisplay()

</script>

</body>
</html>
