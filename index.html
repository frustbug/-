<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>好感度</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
    user-select:none;
}

#love{
    font-size:50px;
    margin-top:80px;
}

#hammer{
    font-size:120px;
    cursor:pointer;
    transition:transform 0.1s;
}

#hammer:active{
    transform:scale(0.8) rotate(-20deg);
}

.floating{
    position:absolute;
    color:#ff6;
    font-size:24px;
    animation:float 1s forwards;
}

@keyframes float{
    0%{
        opacity:1;
        transform:translateY(0);
    }
    100%{
        opacity:0;
        transform:translateY(-80px);
    }
}
</style>
</head>

<body>

<h1>好感度</h1>

<div id="love">0</div>

<div id="hammer">🔨</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


/* =====================
   1️⃣ 把这里换成你的
===================== */

const firebaseConfig = {
  apiKey: "AIzaSyBCUasPyQ0TMUylqju9JOWnkui1MCdHfMQ",
  authDomain: "shiyan-ab7dd.firebaseapp.com",
  databaseURL: "https://shiyan-ab7dd-default-rtdb.firebaseio.com",
  projectId: "shiyan-ab7dd",
  storageBucket: "shiyan-ab7dd.firebasestorage.app",
  messagingSenderId: "1040979139264",
  appId: "1:1040979139264:web:2fe257a380173083446b25"
};


/* =====================
   2️⃣ 初始化
===================== */

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const loveRef = ref(db,"love");


/* =====================
   3️⃣ 同步数据
===================== */

let love = 0;

onValue(loveRef,(snap)=>{

    if(snap.exists()){
        love = snap.val();
        document.getElementById("love").innerText = love;
    }

});


/* =====================
   4️⃣ 点击逻辑
===================== */

let localAdd = 0;

document.getElementById("hammer").onclick = function(e){

    localAdd++;

    showText(e.pageX,e.pageY);

};


/* =====================
   5️⃣ 每秒同步一次
===================== */

setInterval(()=>{

    if(localAdd>0){

        love += localAdd;

        set(loveRef,love);

        localAdd = 0;

    }

},1000);



/* =====================
   6️⃣ 文字冒出来
===================== */

function showText(x,y){

    let div = document.createElement("div");

    div.className="floating";

    div.innerText="+1";

    div.style.left=x+"px";

    div.style.top=y+"px";

    document.body.appendChild(div);

    setTimeout(()=>{

        div.remove();

    },1000);

}


/* =====================
   7️⃣ 禁止复制
===================== */

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("copy",e=>e.preventDefault());

</script>

</body>
</html>
