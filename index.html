<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好感度</title>

<style>

:root{
--primary-color:#ff7eac;
--card-bg:rgba(255,255,255,0.9);
}

body{
font-family:'PingFang SC','Microsoft YaHei',sans-serif;
background:linear-gradient(135deg,#fce4ec 0%,#ffe0e0 100%);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:var(--card-bg);
padding:40px;
border-radius:30px;
box-shadow:0 15px 35px rgba(255,105,135,0.2);
text-align:center;
width:350px;
border:2px solid white;
position:relative;
}

h1{
color:#d81b60;
font-size:1.5rem;
margin-bottom:10px;
}

.subtitle{
font-size:0.85rem;
color:#999;
margin-bottom:20px;
}

.score{
font-size:3rem;
font-weight:bold;
color:#ff4d6d;
}

.progress-container{
background:#eee;
height:12px;
border-radius:6px;
overflow:hidden;
margin:20px 0;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#ff4d6d,#ff8fa3);
width:0%;
transition:width 1s;
}

.heart{
font-size:40px;
color:#ff4d6d;
animation:beat 1.5s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

.hammer{
font-size:40px;
cursor:pointer;
margin-top:20px;
}

.bubble{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:none;
animation:rise 1.2s ease;
}

@keyframes rise{
0%{opacity:0;transform:translate(-50%,20px);}
100%{opacity:1;transform:translate(-50%,-10px);}
}

</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>小策策大人对凑小诺诺的好感度</h1>

<div class="subtitle">
状态：<span id="status">良好</span>
</div>

<div class="score" id="scoreDisplay">0</div>

<div class="progress-container">
<div class="progress-bar" id="bar"></div>
</div>

<div class="bubble" id="bubble">
小诺诺小人想要加好感度！
</div>

<div class="hammer" onclick="hammer()">🔨</div>

</div>

<script>

const initial = 1000000
const days = 180

const decayPerMs =
initial/(days*24*60*60*1000)

let score=0
let lastUpdate=0

async function loadData(){

const res = await fetch("score.json?t="+Date.now())
const data = await res.json()

score = data.score
lastUpdate = data.last_update

update()
}

function update(){

const now = Date.now()
const elapsed = now-lastUpdate

score -= elapsed*decayPerMs

if(score<0)score=0

document.getElementById("scoreDisplay")
.innerText=Math.floor(score).toLocaleString()

const percent=(score/initial)*100

document.getElementById("bar")
.style.width=percent+"%"

lastUpdate=now
}

function hammer(){

const bubble=document.getElementById("bubble")

bubble.style.display="block"

setTimeout(()=>{
bubble.style.display="none"
},1500)

fetch("request.json",{
method:"POST"
})

}

setInterval(loadData,2000)

loadData()

</script>

</body>
</html>
