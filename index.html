<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>好感度</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#d9f0ff);
font-family:sans-serif;

/* 禁止复制 */
user-select:none;
}

.box{
text-align:center;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
position:relative;
}

.value{
font-size:60px;
color:#ff5b9f;
}

/* 锤子按钮 */

.interact{
margin-top:25px;
font-size:45px;
cursor:pointer;
}

/* 冒出来的文字 */

.message{
position:absolute;
left:50%;
bottom:110px;
transform:translateX(-50%);
color:#ff5b9f;
font-size:18px;

background:white;
padding:6px 14px;
border-radius:10px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

opacity:0;
pointer-events:none;
}

/* 动画 */

.message.show{
animation:floatUp 1.5s ease;
}

@keyframes floatUp{

0%{
opacity:0;
transform:translate(-50%,20px);
}

20%{
opacity:1;
}

100%{
opacity:0;
transform:translate(-50%,-40px);
}

}

</style>

</head>
<body>

<div class="box">

<h2>好感度</h2>

<div class="value" id="favorability">0</div>

<div class="message" id="msg">
小诺诺小人想要加好感度
</div>

<div class="interact" id="interactBtn">🔨</div>

</div>

<script type="module">

/* 禁止右键 */

document.addEventListener("contextmenu",e=>{
e.preventDefault()
})

/* Firebase */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"你的apiKey",

authDomain:"你的项目.firebaseapp.com",

databaseURL:"https://你的项目-default-rtdb.firebaseio.com/",

projectId:"你的项目ID",

storageBucket:"你的项目.appspot.com",

messagingSenderId:"xxx",

appId:"xxx"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* 好感度 */

const favorRef = ref(db,"favorability");

onValue(favorRef,(snapshot)=>{

document.getElementById("favorability").innerText =
snapshot.val();

});

/* 锤子互动 */

const interactBtn =
document.getElementById("interactBtn");

const msg =
document.getElementById("msg");

interactBtn.onclick=function(){

msg.classList.remove("show")

void msg.offsetWidth

msg.classList.add("show")

/* 向数据库发送请求 */

push(ref(db,"requests"),{

text:"小诺诺小人想要加好感度",

time:Date.now()

})

}

</script>

</body>
</html>
