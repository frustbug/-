<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好感度</title>

<style>
:root{
--primary-color:#ff7eac;
--card-bg:rgba(255,255,255,0.9);
}

body{
font-family:'PingFang SC','Microsoft YaHei',sans-serif;
background:linear-gradient(135deg,#fce4ec 0%,#ffe0e0 100%);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:var(--card-bg);
padding:40px;
border-radius:30px;
box-shadow:0 15px 35px rgba(255,105,135,0.2);
text-align:center;
width:350px;
border:2px solid white;
}

h1{
color:#d81b60;
font-size:1.5rem;
margin-bottom:10px;
}

.subtitle{
font-size:0.85rem;
color:#999;
margin-bottom:20px;
}

.score{
font-size:3rem;
font-weight:bold;
color:#ff4d6d;
}

.progress-container{
background:#eee;
height:12px;
border-radius:6px;
overflow:hidden;
margin:20px 0;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#ff4d6d,#ff8fa3);
width:0%;
transition:width 1s;
}

.warning{
color:#ff4d6d;
font-weight:bold;
font-size:0.85rem;
display:none;
margin-top:10px;
}

.heart{
font-size:40px;
color:#ff4d6d;
animation:beat 1.5s infinite;
}

@keyframes beat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}

</style>
</head>

<body>

<div class="container">

<div class="heart">❤️</div>

<h1>小策策大人对凑小诺诺的好感度</h1>

<div class="subtitle">
状态：<span id="status">良好</span>
</div>

<div class="score" id="scoreDisplay">0</div>

<div class="progress-container">
<div class="progress-bar" id="bar"></div>
</div>

<div id="warning" class="warning">
⚠️ 警报：好感度已低于50%
</div>

<p style="font-size:0.6rem;color:#ccc;margin-top:20px;">
© 好感度 · 实时更新
</p>

</div>

<script>

const initial = 1000000
const days = 180

const decayPerMs =
initial/(days*24*60*60*1000)

let score =
localStorage.getItem("love_score")
? parseFloat(localStorage.getItem("love_score"))
: initial

let lastUpdate =
localStorage.getItem("last_update")
? parseInt(localStorage.getItem("last_update"))
: Date.now()

function update(){

const now = Date.now()

const elapsed = now-lastUpdate

score -= elapsed*decayPerMs

if(score<0)score=0

document.getElementById("scoreDisplay")
.innerText=Math.floor(score).toLocaleString()

const percent=(score/initial)*100

document.getElementById("bar")
.style.width=Math.max(0,percent)+"%"

const warning=document.getElementById("warning")
const status=document.getElementById("status")

if(percent<50){

warning.style.display="block"

status.innerText="危险"
status.style.color="#ff4d6d"

}else{

warning.style.display="none"

status.innerText="良好"
status.style.color="#2ecc71"

}

localStorage.setItem("love_score",score)
localStorage.setItem("last_update",now)

lastUpdate=now

}

setInterval(update,1000)

update()

</script>

</body>
</html>
